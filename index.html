<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>報價單小幫手</title>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 引入 Tailwind CSS 進行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 防止手機端點擊輸入框時畫面放大 */
        input, textarea, button { font-size: 16px !important; }
        /* 隱藏預設的數字上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
        
        /* 柔和的點擊回饋 */
        .tap-effect:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans selection:bg-emerald-200">

    <div class="max-w-md mx-auto p-4 pt-6">
        
        <!-- 頂部標題與狀態 -->
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-slate-700 flex items-center justify-center gap-2">
                <i data-lucide="clipboard-list" class="w-7 h-7 text-emerald-600"></i>
                報價單小幫手
            </h1>
            <p id="liff-status" class="text-sm text-slate-400 mt-1">系統載入中...</p>
        </header>

        <!-- 頁籤切換 (Tabs) -->
        <div class="flex p-1 bg-slate-200/60 rounded-xl mb-6 shadow-inner">
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-2.5 text-center rounded-lg font-medium bg-white text-slate-800 shadow-sm transition-all">
                新增項目
            </button>
            <button onclick="switchTab('manage')" id="tab-manage" class="flex-1 py-2.5 text-center rounded-lg font-medium text-slate-500 hover:text-slate-700 transition-all">
                管理與設定
            </button>
        </div>

        <!-- 區塊一：新增報價項目 -->
        <div id="section-add" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 transition-opacity duration-300">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5 ml-1">品項名稱 <span class="text-red-400">*</span></label>
                    <input type="text" id="itemName" placeholder="例如：六分水管、水龍頭" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5 ml-1">數量 <span class="text-red-400">*</span></label>
                        <!-- inputmode="numeric" 可以叫出手機的數字鍵盤 -->
                        <input type="number" id="quantity" inputmode="numeric" placeholder="例如：5" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5 ml-1">單價 ($) <span class="text-red-400">*</span></label>
                        <input type="number" id="price" inputmode="numeric" placeholder="例如：150" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5 ml-1">備註 (選填)</label>
                    <input type="text" id="memo" placeholder="例如：主臥室用、包含安裝" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all">
                </div>

                <button onclick="submitNewItem()" class="tap-effect w-full mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md shadow-emerald-500/30 flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    確認新增項目
                </button>
            </div>
        </div>

        <!-- 區塊二：管理與設定 (編輯/退出) -->
        <div id="section-manage" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-slate-100 transition-opacity duration-300">
            <p class="text-slate-500 text-sm mb-5 text-center">點擊下方按鈕，系統將自動傳送指令給機器人進行處理。</p>
            
            <div class="space-y-4">
                <!-- 編輯現有報價單：傳送特定指令讓 n8n 撈取資料庫或進入編輯模式 -->
                <button onclick="sendActionCommand('[編輯估價單]')" class="tap-effect w-full bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="file-edit" class="w-5 h-5"></i>
                    編輯已有估價單
                </button>

                <!-- 退出報價模式：解決 n8n 卡在等待輸入的狀態 -->
                <button onclick="sendActionCommand('[退出報價模式]')" class="tap-effect w-full bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-600 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    結束 / 退出報價模式
                </button>
            </div>
        </div>

    </div>

    <!-- 提示彈窗 (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full opacity-0 pointer-events-none transition-opacity duration-300 shadow-lg flex items-center gap-2 z-50">
        <i data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-msg">提示訊息</span>
    </div>

    <script>
        // 初始化 Icons
        lucide.createIcons();

        // --- UI 邏輯 ---
        function switchTab(tab) {
            const tabAdd = document.getElementById('tab-add');
            const tabManage = document.getElementById('tab-manage');
            const secAdd = document.getElementById('section-add');
            const secManage = document.getElementById('section-manage');

            if (tab === 'add') {
                tabAdd.className = "flex-1 py-2.5 text-center rounded-lg font-medium bg-white text-slate-800 shadow-sm transition-all";
                tabManage.className = "flex-1 py-2.5 text-center rounded-lg font-medium text-slate-500 hover:text-slate-700 transition-all";
                secManage.classList.add('hidden');
                secAdd.classList.remove('hidden');
            } else {
                tabManage.className = "flex-1 py-2.5 text-center rounded-lg font-medium bg-white text-slate-800 shadow-sm transition-all";
                tabAdd.className = "flex-1 py-2.5 text-center rounded-lg font-medium text-slate-500 hover:text-slate-700 transition-all";
                secAdd.classList.add('hidden');
                secManage.classList.remove('hidden');
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.textContent = message;
            toast.style.backgroundColor = isError ? '#ef4444' : '#1e293b'; // 紅色或深灰
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // --- LIFF 與業務邏輯 ---
        const LIFF_ID = "YOUR_LIFF_ID"; // 請在此填入你的 LIFF ID

        async function initLiff() {
            const statusEl = document.getElementById('liff-status');

            // 檢查是否尚未替換 LIFF ID，避免發生 channel not found 錯誤
            if (LIFF_ID === "YOUR_LIFF_ID") {
                statusEl.textContent = "請先設定 LIFF ID (預覽模式)";
                statusEl.classList.replace('text-slate-400', 'text-amber-500');
                console.warn("尚未設定真實的 LIFF ID，跳過初始化以避免錯誤。請至 LINE Developers 後台取得並替換程式碼中的 YOUR_LIFF_ID。");
                return;
            }

            try {
                // 如果在本地預覽，略過 LIFF 初始化以免報錯
                if (!window.liff) {
                    statusEl.textContent = "本地預覽模式";
                    return;
                }
                
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    statusEl.textContent = "已連線至 LINE";
                    statusEl.classList.replace('text-slate-400', 'text-emerald-500');
                } else {
                    statusEl.textContent = "請在 LINE App 內開啟";
                    // liff.login(); // 若需要外部瀏覽器登入可開啟
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                statusEl.textContent = "連線失敗，請稍後再試";
                statusEl.classList.replace('text-slate-400', 'text-rose-500');
            }
        }

        // 頁面載入後初始化
        document.addEventListener("DOMContentLoaded", initLiff);

        // 統一發送訊息的函式
        async function sendMsgToLine(textStr) {
            if (!window.liff || !liff.isInClient()) {
                // 如果不是在 LINE 裡面開啟（例如電腦瀏覽器），用 alert 模擬
                alert("即將傳送給機器人：\n\n" + textStr);
                return;
            }
            try {
                await liff.sendMessages([{ type: 'text', text: textStr }]);
                liff.closeWindow(); // 傳送成功後關閉視窗
            } catch (error) {
                showToast("傳送失敗，請確認網路狀態", true);
                console.error("sendMessages error", error);
            }
        }

        // 動作 1：送出新增項目
        function submitNewItem() {
            const itemName = document.getElementById('itemName').value.trim();
            const quantity = document.getElementById('quantity').value.trim();
            const price = document.getElementById('price').value.trim();
            const memo = document.getElementById('memo').value.trim() || '無';

            if (!itemName || !quantity || !price) {
                showToast("請填寫品項、數量與單價", true);
                return;
            }

            // 組合字串，方便 n8n 之後用 Regex 或 Split 拆解
            const messageText = `[新增報價細節]\n品項：${itemName}\n數量：${quantity}\n單價：${price}\n備註：${memo}`;
            sendMsgToLine(messageText);
        }

        // 動作 2 & 3：傳送特定操作指令 (編輯/退出)
        function sendActionCommand(commandStr) {
            // commandStr 會是 "[編輯估價單]" 或 "[退出報價模式]"
            sendMsgToLine(commandStr);
        }
    </script>
</body>
</html>
